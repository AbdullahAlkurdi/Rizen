name: rizen
description: RizenOS — A Life Operating System for sustainable discipline and growth.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  phosphoricons_flutter: ^1.0.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  dio: ^5.4.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.6
  firebase_messaging: ^15.2.6
  cloud_functions: ^5.5.0
  flutter_dotenv: ^5.1.0
  sensors_plus: ^5.0.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.3
  geolocator: ^14.0.3
  permission_handler: ^12.0.3
  connectivity_plus: ^5.0.0
  get_it: ^7.6.0
  fl_chart: '>=0.61.0'
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  build_resolvers: ^2.5.4
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  flutter_native_splash: ^2.4.1
  mocktail: ^1.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/data/adhkar.json
    - assets/data/dua_library.json
